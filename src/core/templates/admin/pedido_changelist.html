{% extends "admin/change_list.html" %}
{% load static %}
{% load i18n %}

{% block object-tools %}
    {{ block.super }}

    <div style="margin-top:10px;margin-bottom:15px;">

        <a class="button btn btn-warning"
           href="{% url 'ordem_servico_page' %}">
            {% trans "Cálculo de OS" %}
        </a>

        <a href="/admin/fluxo/requisicao/executar-selectrequisicao/"
           class="button btn btn-success">
            🔄 Atualizar Requisições
        </a>

        <a href="{% url 'resumo_lotes' %}"
           target="_blank"
           class="button btn btn-secondary"
           style="background:#007BFF;color:#fff;">
            📊 Resumo de Lotes Ativos
        </a>

        <button type="button"
                class="button btn btn-secondary"
                onclick="executarAction('imprimir_fluxograma')">
            🖨️ Fluxograma
        </button>

        <button type="button"
                class="button btn btn-secondary"
                onclick="executarAction('imprimir_fluxo_detalhado')">
            🖨️ Fluxo Detalhado
        </button>

    </div>

{% endblock %}

{% block extrahead %}
{{ block.super }}

<script>

function executarAction(nomeAction){

    const form = document.getElementById("changelist-form");

    if(!form){
        alert("Não foi encontrado o formulário do Django Admin.");
        return;
    }

    // Procura o select de actions (topo ou rodapé)
    let actionSelect = document.querySelector('select[name="action"]');

    if(!actionSelect){
        actionSelect = document.querySelectorAll('select[name="action"]')[0];
    }

    if(!actionSelect){
        alert("Não foi encontrado o campo de actions.");
        return;
    }

    actionSelect.value = nomeAction;

    // Procura o botão oficial "Executar"
    let submitButton = form.querySelector('button[name="index"]');

    if(!submitButton){
        submitButton = form.querySelector('input[name="index"]');
    }

    if(!submitButton){
        alert("Não foi encontrado o botão de execução do admin.");
        return;
    }

    // Envia para nova aba
    form.target = "_blank";

    submitButton.click();

    // Volta ao comportamento padrão
    setTimeout(function(){

        form.target = "";

        window.location.reload();

    },800);

}

</script>

{% endblock %}
